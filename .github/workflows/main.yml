name: Auto Update IPTV

on:
  schedule:
    - cron: '0 */2 * * *' # Robot akan berjalan automatik setiap 2 jam
  workflow_dispatch:      # Benarkan anda tekan butang "Run workflow" secara manual

permissions:
  contents: write         # Memberi kebenaran penuh untuk robot simpan fail ke repository

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run grabber script
        run: python grabber.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          # Commit hanya dibuat jika ada perubahan pada fail
          git commit -m "Auto Update Links: $(date)" || exit 0
          git push
